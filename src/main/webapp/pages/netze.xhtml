<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui">
<h:head>
	<title>Geisternetze - Shea Sepherd</title>
</h:head>
<h:body>
	<h1>Alle Geisternetze</h1>
	<a href="/ghostnet/">Startseite</a> |
    <a href="/ghostnet/pages/melden.xhtml">Neues Netz melden</a>

	<h:form id="netzFormular">

		<!--  Tabelle aller Geisternetze -->
		<h:dataTable value="#{ghostNetBean.alleNetze}" var="netz" border="1">

			<!--  Eindeutige ID des Geisternetzes -->
			<h:column>
				<f:facet name="header">ID</f:facet>
            #{netz.id}
        </h:column>

			<!-- Koordinaten des Netzes  -->
			<h:column>
				<f:facet name="header">Koordinaten</f:facet>
            #{netz.latitude}, #{netz.longitude}
        </h:column>

			<!-- Geschätzte Grösse des Netzes  -->
			<h:column>
				<f:facet name="header">Größe</f:facet>
            #{netz.groesse}
        </h:column>

			<!--  aktueller Status des Geisternetzes -->
			<h:column>
				<f:facet name="header">Status</f:facet>
            #{netz.status}
        </h:column>

			<!-- Button öffnet Dialog zur Angabe der Persondaten-->
			<h:column>
				<f:facet name="header">Aktionen</f:facet>


				<!-- Button um Person für Netzbergung einzutragen - bei GEMELDET(User Story 2) -->
				<h:panelGroup rendered="#{netz.status == 'GEMELDET'}">
					<p:commandButton value="Bergen"
						action="#{ghostNetBean.netzAuswaehlen(netz.id)}"
						oncomplete="PF('bergungDialog').show()" update="netzFormular" />
				</h:panelGroup>

				<!--   Button um Netz als geborgen zu melden - bei BERGUNG_BEVORSTEHEND (User Story 4) -->
				<h:panelGroup rendered="#{netz.status == 'BERGUNG_BEVORSTEHEND'}">
					<p:commandButton value="Geborgen"
						action="#{ghostNetBean.netzFuerBestaetigungAuswaehlen(netz.id)}"
						oncomplete="PF('bestaetigungDialogVar').show()"
						update="netzFormular" />
				</h:panelGroup>
				<!-- Button zum Verschollen melden - bei GEMELDET oder BERGUNG_BEVORSTEHEND -->
				<h:panelGroup
					rendered="#{netz.status == 'GEMELDET' or netz.status == 'BERGUNG_BEVORSTEHEND'}">
					<p:commandButton value="Verschollen"
						action="#{ghostNetBean.netzFuerVerschollenAuswaehlen(netz.id)}"
						oncomplete="PF('verschollenDialog').show()" update="netzFormular" />
				</h:panelGroup>

			</h:column>
		</h:dataTable>

		<!-- Dialog für Bergungsanmeldung -->
		<p:dialog header="Bergung melden" widgetVar="bergungDialog"
			modal="true">
			<!-- Name der bergenden Person -->
			<h:outputLabel value="Name:" />
			<h:inputText value="#{ghostNetBean.bergendePersonName}" />
			<br />
			<!-- Telefonnummer der bergenden Person -->
			<h:outputLabel value="Telefon:" />
			<h:inputText value="#{ghostNetBean.bergendePersonTelefon}" />
			<br />
			<p:commandButton value="Speichern"
				action="#{ghostNetBean.bergungMelden(ghostNetBean.ausgewaehltesNetzId)}"
				oncomplete="PF('bergungDialog').hide()" update="netzFormular" />
		</p:dialog>

		<!--  Bestätigungsdialog zum geborgen Melden (User Story 4) -->
		<p:dialog header="Bergung bestätigen"
			widgetVar="bestaetigungDialogVar" modal="true">
			<h:outputText
				value="Netz als geborgen melden? Eingetragene Person: #{ghostNetBean.bergendePersonNameAnzeige}" />
			<br />
			<p:commandButton value="Ja"
				action="#{ghostNetBean.alsGeborgenMelden(ghostNetBean.ausgewaehltesNetzId)}"
				oncomplete="PF('bestaetigungDialogVar').hide()"
				update="netzFormular" />
			<p:commandButton value="Abbrechen"
				onclick="PF('bestaetigungDialogVar').hide()" type="button" />
		</p:dialog>

		<!-- Dialog für Verschollen-Meldung (User Story 7) -->
		<p:dialog header="Netz als verschollen melden"
			widgetVar="verschollenDialog" modal="true">
			<!-- Name der meldenden Person -->
			<h:outputLabel value="Name:" />
			<h:inputText value="#{ghostNetBean.verschollenPersonName}" />
			<br />
			<!-- Telefonnummer der meldenden Person -->
			<h:outputLabel value="Telefon:" />
			<h:inputText value="#{ghostNetBean.verschollenPersonTelefon}" />
			<br />
			<p:commandButton value="Als verschollen melden"
				action="#{ghostNetBean.alsVerschollenMelden()}"
				oncomplete="PF('verschollenDialog').hide()" update="netzFormular" />
			<p:commandButton value="Abbrechen"
				onclick="PF('verschollenDialog').hide()" type="button" />
		</p:dialog>

	</h:form>

</h:body>
</html>
